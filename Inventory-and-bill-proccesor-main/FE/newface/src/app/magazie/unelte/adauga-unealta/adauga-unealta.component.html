<div class="tools-layout">
  <aside class="sidebar">
    <h1 (click)="seeMagazie()">Magazie</h1>
    <div class="pages">
      <h5 (click)="seeUnelte()">Unelte</h5>
      <h5 class="page-on" (click)="seeAdaugaUnealta()">Adauga unealta</h5>
      <h5 (click)="seePredareUnealta()">Predare/primire</h5>
    </div>
  </aside>

  <main class="tools-page">
    <header class="page-head">
      <div>
        <p class="eyebrow">Magazie</p>
        <h2>Adauga unealta</h2>
      </div>
    </header>

    <section class="editor-panel add-panel">
      <div class="editor-title">
        <h3>Unealta noua</h3>
      </div>

      <div class="add-form-grid">
        <label>
          <span>Nume unealta</span>
          <input type="text" [(ngModel)]="form.ToolName" placeholder="Ex: Ruleta Stanley 5m">
        </label>

        <label>
          <span>Serie</span>
          <input type="text" [(ngModel)]="form.ToolSerie" placeholder="Optional">
        </label>

        <label>
          <span>Tip scula</span>
          <select [(ngModel)]="form.IsSSM">
            <option [ngValue]="false">Scule santier</option>
            <option [ngValue]="true">Scule SSM</option>
          </select>
        </label>

        <label>
          <span>Angajat</span>
          <select class="employee-select" [(ngModel)]="form.AssignedUserId" [disabled]="loadingUsers">
            <option [ngValue]="null">Fara angajat</option>
            <option *ngFor="let user of users" [ngValue]="user.UserId">{{ user.UserName }}</option>
          </select>
        </label>

        <label>
          <span>Numar bucati</span>
          <input type="number" min="1" step="1" [(ngModel)]="form.Pieces">
        </label>

        <label>
          <span>Data primirii</span>
          <div class="readonly-field">{{ computedDateReceived }}</div>
        </label>

        <label class="details-field">
          <span>Detalii</span>
          <textarea rows="3" [(ngModel)]="form.Detail" placeholder="Detalii utile pentru magazie"></textarea>
        </label>

        <div class="auto-info">
          <div class="auto-info-title">Informatii automate</div>
          <div class="auto-info-grid">
            <div class="auto-card">
              <span>Stare automata</span>
              <strong>{{ computedStatusLabel }}</strong>
            </div>

            <div class="auto-card">
              <span>Locatie automata</span>
              <strong>{{ computedLocation }}</strong>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <div class="state error" *ngIf="error">{{ error }}</div>
        <div class="state success" *ngIf="success">{{ success }}</div>
        <button class="btn primary" type="button" [disabled]="saving" (click)="saveTool()">
          {{ saving ? 'Se salveaza...' : 'Adauga unealta' }}
        </button>
      </div>
    </section>
  </main>
</div>
